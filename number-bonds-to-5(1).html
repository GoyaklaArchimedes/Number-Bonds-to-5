<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Number Bonds Mastery to 5 — Mr Nathan's Maths Tuition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --bg: #F7EED6;
      --bg2: #F0E4C0;
      --ink: #1a1a1a;
      --muted: #888;
      --panel: #ffffffa0;
      --panelBorder: #e8d9b5;
      --tile: #F7EED6;
      --tileBorder: #c9c1ac;
      --btn: #2F6FB3;
      --btnHover: #255a94;
      --btnText: #fff;
      --ghost: #2F6FB3;
      --good: #1b7f3a;
      --bad: #b3261e;
      --accent: #d94f2a;
      --radius: 16px;
      --shadow: 0 2px 12px #00000014;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app {
      max-width: 860px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px 16px 100px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 4px 18px;
      border-bottom: 2px solid var(--panelBorder);
      margin-bottom: 18px;
    }
    header img {
      width: 78px; height: 78px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .brand { display: flex; flex-direction: column; line-height: 1.2; }
    .brand .name { font-weight: 900; font-size: 17px; color: var(--ink); }
    .brand .series { font-size: 12px; font-weight: 700; color: var(--btn); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 1px; }
    .brand .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Cards ── */
    .card {
      background: var(--panel);
      border: 1.5px solid var(--panelBorder);
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: var(--shadow);
    }

    /* ── Screen headings ── */
    .screenTitle {
      text-align: center;
      font-weight: 900;
      font-size: clamp(20px, 3vw, 30px);
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .screenSub {
      text-align: center;
      font-weight: 600;
      font-size: clamp(13px, 2vw, 16px);
      color: #444;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .sectionDivider {
      width: 48px; height: 4px;
      background: var(--btn);
      border-radius: 99px;
      margin: 0 auto 18px;
    }

    /* ── Buttons ── */
    button {
      cursor: pointer; border: 0;
      border-radius: 12px;
      padding: 13px 20px;
      font-weight: 900;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      line-height: 1;
    }
    button:active { transform: scale(0.97); }

    .btnPrimary {
      background: var(--btn);
      color: var(--btnText);
      box-shadow: 0 3px 10px #2F6FB340;
    }
    .btnPrimary:hover { background: var(--btnHover); }

    .btnGhost {
      background: transparent;
      border: 2px solid var(--btn);
      color: var(--btn);
    }
    .btnGhost:hover { background: #2F6FB310; }

    .btnDanger {
      background: transparent;
      border: 2px solid #999;
      color: #666;
    }
    .btnDanger:hover { border-color: var(--bad); color: var(--bad); }

    /* ── Home grid ── */
    .homeGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    /* ── Section badge ── */
    .sectionBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--btn);
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 14px;
    }

    /* ── Rows / items ── */
    .rows4 { display: flex; flex-direction: column; gap: 12px; }
    .rowItem {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1.5px solid var(--panelBorder);
      background: #ffffff40;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .rowItem.ok  { border-color: var(--good); background: #e8f5ec; box-shadow: 0 0 0 3px #1b7f3a22; }
    .rowItem.bad { border-color: var(--bad);  background: #fdf0ef; box-shadow: 0 0 0 3px #b3261e22; }
    .rowLeft { display: flex; align-items: center; gap: 14px; }

    /* ── Tile (number box) ── */
    .tile {
      width: 112px; height: 112px;
      background: var(--tile);
      border: 2px solid var(--tileBorder);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 68px; font-weight: 900;
      box-shadow: inset 0 2px 6px #00000010;
    }
    .dominoBox {
      width: 132px; height: 132px;
      display: flex; align-items: center; justify-content: center;
    }
    .midText {
      min-width: 100px;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
    }
    .makeFiveCue {
      color: var(--accent);
      font-weight: 900;
      font-size: 22px;
    }
    .orText { font-weight: 900; margin: 0 14px; color: #888; font-size: 14px; }
    .tileRow {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 12px 4px;
    }

    /* ── Option buttons ── */
    .options { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
    .optBtn {
      width: 66px; height: 56px;
      border-radius: 12px;
      background: #ffffffcc;
      border: 2px solid var(--panelBorder);
      font-size: 24px; font-weight: 900;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.15s, background 0.15s;
    }
    .optBtn:hover { border-color: var(--btn); background: #e8f0fb; }

    /* ── Feedback messages ── */
    .msg { text-align: center; margin-top: 12px; font-weight: 900; min-height: 28px; font-size: 16px; }
    .msg.good { color: var(--good); }
    .msg.bad  { color: var(--bad); }
    .smallNote { text-align: center; font-size: 12px; color: var(--muted); margin-top: 10px; font-weight: 700; }
    .microHint { text-align: center; color: var(--muted); font-weight: 700; font-size: 12px; margin: -6px 0 14px; }

    /* ── Toggle pills ── */
    .toggleBar { display: flex; justify-content: center; gap: 10px; margin: 10px 0 18px; flex-wrap: wrap; }
    .pill {
      padding: 9px 18px;
      border-radius: 999px;
      font-weight: 900; font-size: 13px;
      border: 2px solid var(--panelBorder);
      background: #ffffffaa;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.03em;
      transition: all 0.15s;
    }
    .pill.active { border-color: var(--btn); color: var(--btn); background: #e8f0fb; }

    /* ── Number equation display ── */
    .sumLine {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin: 18px 0; flex-wrap: wrap;
    }
    .sumExpr { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .bigSym { font-size: 48px; font-weight: 900; color: var(--ink); }

    /* ── Answer box ── */
    .ansPair {
      width: 170px; height: 110px;
      border: 2px solid var(--tileBorder);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
    }
    .ansPair .left  { width: 50%; background: var(--tile); border-right: 2px solid var(--tileBorder); }
    .ansPair .right { width: 50%; background: #fff; }
    .ansOverlay {
      position: relative; width: 170px; height: 110px;
      cursor: pointer; border-radius: 10px;
    }
    .ansOverlay.active-box .ansPair {
      outline: 3px solid var(--btn);
      border-radius: 10px;
    }
    .ansText {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; font-weight: 900; pointer-events: none;
    }
    .tapHint { text-align: center; color: var(--muted); font-weight: 700; font-size: 12px; margin-top: 8px; }

    /* ── Keypad ── */
    .keypad {
      display: grid; grid-template-columns: repeat(5,1fr);
      gap: 9px; margin: 16px auto 0; max-width: 420px;
    }
    .key {
      height: 52px; border-radius: 12px;
      background: #ffffffbb; border: 2px solid var(--panelBorder);
      font-size: 17px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.15s, background 0.15s;
    }
    .key:hover { border-color: var(--btn); background: #e8f0fb; }
    .key.wide { grid-column: span 2; }

    /* ── Info card (instruction screens) ── */
    .infoCard {
      max-width: 540px; margin: 0 auto;
      text-align: center; padding: 20px 16px;
    }
    .infoIcon { font-size: 58px; margin-bottom: 14px; }
    .infoBody {
      font-size: 16px; line-height: 1.75; color: #333; font-weight: 600;
    }
    .infoBody strong { color: var(--ink); }
    .infoBody p { margin-bottom: 10px; }
    .infoBody p:last-child { margin-bottom: 0; }

    /* ── Fact box (coloured info panels) ── */
    .factBox {
      background: #fff8ec; border: 2px solid #e8c87a;
      border-radius: 12px; padding: 14px 16px;
      margin: 12px 0; font-weight: 700; font-size: 15px;
      color: #5a3a00;
    }

    /* ── Home screen cards ── */
    .sectionCard {
      background: #ffffff60;
      border: 1.5px solid var(--panelBorder);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .sectionCard .sc-label {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--btn);
    }
    .sectionCard .sc-title {
      font-size: 16px; font-weight: 900; color: var(--ink);
    }
    .sectionCard .sc-desc {
      font-size: 13px; font-weight: 600; color: #666; line-height: 1.5;
    }
    .sectionCard .sc-btn { margin-top: 6px; align-self: flex-start; }

    /* ── Progress breadcrumb ── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; color: var(--muted);
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .breadcrumb span { color: var(--ink); }

    /* ── Footer bar ── */
    .footerBar {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: #f0e6c4;
      border-top: 1.5px solid var(--panelBorder);
      padding: 10px 16px;
      z-index: 100;
    }
    .footerInner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .footerLeft {
      font-size: 11px; color: var(--muted);
      display: flex; gap: 8px; align-items: center;
    }
    .footerLeft .version {
      background: var(--panelBorder); color: #666;
      padding: 2px 7px; border-radius: 99px;
      font-weight: 800; font-size: 10px;
    }
    .footerRight { display: flex; gap: 10px; align-items: center; }

    /* ── Print button ── */
    .printBtn {
      background: #fff;
      border: 1.5px solid var(--panelBorder);
      color: #555;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .printBtn:hover { border-color: var(--btn); color: var(--btn); }
    .printBtnBar {
      display: flex; justify-content: flex-end;
      margin-bottom: 10px;
    }

    /* ── Flash screen ── */
    .flashCountdown {
      display: flex; align-items: center; justify-content: center;
      height: 160px;
    }
    .flashNum {
      font-size: 80px; font-weight: 900; color: var(--btn);
      animation: popIn 0.2s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(1.3); opacity: 0.5; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .tile { width: 88px; height: 88px; font-size: 56px; }
      .dominoBox { width: 108px; height: 108px; }
      .midText { min-width: 80px; font-size: 20px; }
      header img { width: 56px; height: 56px; }
      .ansPair, .ansOverlay { width: 144px; height: 96px; }
      .ansText { font-size: 44px; }
      .bigSym { font-size: 40px; }
      .card { padding: 16px 14px; }
    }

    /* ══════════════════════════════════════════════
       PRINT STYLES
    ══════════════════════════════════════════════ */
    @media print {
      * { box-sizing: border-box; }
      body {
        background: white !important;
        font-family: 'Nunito', Arial, sans-serif;
        color: #111;
        margin: 0; padding: 0;
      }
      .app, .footerBar, #main { display: none !important; }
      .printSheet { display: block !important; }

      .printSheet {
        width: 210mm;
        min-height: 297mm;
        padding: 14mm 16mm;
        page-break-after: always;
      }
      .ps-header {
        display: flex; align-items: center; gap: 12px;
        border-bottom: 2.5px solid #2F6FB3;
        padding-bottom: 8px; margin-bottom: 12px;
      }
      .ps-header img { width: 56px; height: 56px; object-fit: contain; }
      .ps-header .ps-brand { display: flex; flex-direction: column; line-height: 1.25; }
      .ps-header .ps-brand .ps-name { font-weight: 900; font-size: 14px; }
      .ps-header .ps-brand .ps-sub  { font-size: 10px; color: #777; }
      .ps-title { font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 4px; }
      .ps-sub   { font-size: 12px; font-weight: 600; text-align: center; color: #555; margin-bottom: 14px; }
      .ps-name-line {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 14px; font-size: 12px; font-weight: 700;
      }
      .ps-name-line .nl-label { white-space: nowrap; }
      .ps-name-line .nl-line {
        flex: 1; border-bottom: 1.5px solid #333; height: 18px;
      }
      .ps-name-line .nl-date { white-space: nowrap; }
      .ps-name-line .nl-dateline { width: 100px; border-bottom: 1.5px solid #333; height: 18px; }

      /* worksheet grids */
      .ps-grid {
        display: grid;
        gap: 12px;
      }
      .ps-grid-2 { grid-template-columns: 1fr 1fr; }
      .ps-grid-1 { grid-template-columns: 1fr; }

      .ps-item {
        border: 1.5px solid #ccc;
        border-radius: 8px;
        padding: 10px 12px;
        display: flex; align-items: center; gap: 12px;
        background: white;
      }
      .ps-item .ps-num {
        width: 52px; height: 52px;
        border: 2px solid #ccc; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 34px; font-weight: 900;
        background: #fafafa; flex-shrink: 0;
      }
      .ps-item .ps-cue {
        font-size: 18px; font-weight: 900; color: #c0392b; flex-shrink: 0;
      }
      .ps-item .ps-domino-area {
        flex: 1; display: flex; align-items: center; justify-content: center;
      }
      .ps-item .ps-box {
        width: 52px; height: 52px;
        border: 2px solid #999; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        background: white;
      }

      /* Fill-in-blank items */
      .ps-blank-item {
        border: 1.5px solid #ccc; border-radius: 8px;
        padding: 10px 14px;
        display: flex; align-items: center; justify-content: center; gap: 12px;
        font-size: 22px; font-weight: 900;
        background: white;
      }
      .ps-blank-box {
        display: inline-block;
        width: 46px; height: 38px;
        border-bottom: 2.5px solid #333;
        text-align: center; vertical-align: bottom;
      }

      /* Bond pair items */
      .ps-bond-item {
        border: 1.5px solid #ccc; border-radius: 8px;
        padding: 12px; background: white;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
      }
      .ps-bond-dominos {
        display: flex; align-items: center; gap: 8px;
      }
      .ps-bond-eq {
        font-size: 16px; font-weight: 900;
      }

      .ps-footer {
        margin-top: auto;
        border-top: 1px solid #ddd;
        padding-top: 8px;
        font-size: 9px; color: #aaa; text-align: center;
      }
      .ps-score-box {
        display: flex; align-items: center; justify-content: flex-end;
        gap: 8px; margin-bottom: 12px; font-size: 12px; font-weight: 700;
      }
      .ps-score-box .sb-label { }
      .ps-score-box .sb-box {
        width: 60px; height: 28px; border: 1.5px solid #999; border-radius: 6px;
      }

      /* Flash cards grid */
      .ps-flashcards {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin: 10px 0;
      }
      .ps-flashcard {
        border: 1.5px solid #ccc;
        border-radius: 8px;
        padding: 8px 6px;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        background: white;
      }
      .ps-flashcard .pf-label {
        font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <img id="headerLogo" src="" alt="Mr Nathan's Maths Tuition logo">
    <div class="brand">
      <div class="name">Mr Nathan's Maths Tuition</div>
      <div class="series">Visual Fluency Trainer Series</div>
      <div class="sub">Isle of Man</div>
    </div>
  </header>
  <main id="main"></main>
</div>

<div class="footerBar">
  <div class="footerInner">
    <div class="footerLeft">
      <span>Number Bonds Mastery to 5</span>
      <span class="version">v2.0</span>
    </div>
    <div class="footerRight">
      <button id="backBtn" class="btnGhost">← Back</button>
      <button id="nextBtn" class="btnPrimary">Next →</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PRINT SHEETS (hidden on screen)

<script>
/* ============================================================

/* ============================================================
   SECTION 1 — Pure utility functions
   ============================================================ */

function shuffleInPlace(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (var k of a) if (!b.has(k)) return false;
  return true;
}

function isDiagonal2(sel) {
  return setsEqual(sel, new Set(["TL","BR"])) || setsEqual(sel, new Set(["TR","BL"]));
}

function isDiagonal3(sel) {
  return setsEqual(sel, new Set(["TL","C","BR"])) || setsEqual(sel, new Set(["TR","C","BL"]));
}

function escHtml(s) {
  return String(s).replace(/[&<>"]/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
  });
}

function matchesBitPattern(bit, sel) {
  if (bit === 1) return setsEqual(sel, new Set(["C"]));
  if (bit === 2) return isDiagonal2(sel);
  if (bit === 3) return isDiagonal3(sel);
  if (bit === 4) return setsEqual(sel, new Set(["TL","TR","BL","BR"]));
  return false;
}

/* ============================================================
   SECTION 2 — Domino SVG helpers
   ============================================================ */

var PIPS = {
  TL:[22,22], TR:[78,22], BL:[22,78], BR:[78,78],
  ML:[22,50], MR:[78,50], C:[50,50]
};

function pipKeysFor(n) {
  if (n === 0) return [];
  if (n === 1) return ["C"];
  if (n === 2) return ["TL","BR"];
  if (n === 3) return ["TL","C","BR"];
  if (n === 4) return ["TL","TR","BL","BR"];
  if (n === 5) return ["TL","TR","C","BL","BR"];
  return [];
}

function dominoSVGStatic(n, size) {
  size = size || 120;
  var keys = pipKeysFor(n);
  var circles = keys.map(function(k) {
    var xy = PIPS[k];
    return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="9" fill="#fff"/>';
  }).join("");
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    +'<rect x="4" y="4" width="92" height="92" rx="8" fill="#1a1a2e"/>'
    +circles+'</svg>';
}

function dominoSVGInteractive(selectedKeys, size) {
  size = size || 120;
  var spots = ["TL","TR","BL","BR","C"];
  var circles = spots.map(function(k) {
    var xy = PIPS[k];
    var on = selectedKeys.has(k);
    return '<circle data-pip="'+k+'" cx="'+xy[0]+'" cy="'+xy[1]+'"'
      +' r="10" fill="'+(on?'#fff':'#ffffff1a')+'"'
      +' stroke="'+(on?'none':'#ffffff40')+'" stroke-width="2" style="cursor:pointer"/>';
  }).join("");
  return '<svg class="dominoInteractive" width="'+size+'" height="'+size+'"'
    +' viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="button" aria-label="Interactive domino">'
    +'<rect x="4" y="4" width="92" height="92" rx="8" fill="#1a1a2e"/>'
    +circles+'</svg>';
}

/* ── Print domino SVG (black & white friendly) ── */
function dominoSVGPrint(n, size) {
  size = size || 56;
  var keys = pipKeysFor(n);
  var circles = keys.map(function(k) {
    var xy = PIPS[k];
    return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="9" fill="#fff"/>';
  }).join("");
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    +'<rect x="4" y="4" width="92" height="92" rx="8" fill="#111" stroke="#333" stroke-width="2"/>'
    +circles+'</svg>';
}

/* ── Blank domino outline for worksheets ── */
function dominoSVGBlank(size) {
  size = size || 56;
  var spots = ["TL","TR","BL","BR","C"];
  var circles = spots.map(function(k) {
    var xy = PIPS[k];
    return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="9" fill="none" stroke="#bbb" stroke-width="1.5"/>';
  }).join("");
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    +'<rect x="4" y="4" width="92" height="92" rx="8" fill="white" stroke="#999" stroke-width="2"/>'
    +circles+'</svg>';
}

/* ============================================================
   SECTION 3 — State factories
   ============================================================ */

function freshW3() {
  return {
    selections: {1:new Set(),2:new Set(),3:new Set(),4:new Set()},
    results:    {1:null,2:null,3:null,4:null}
  };
}

function freshW5() {
  var pool = [
    {q:"☐ + 1 = 5",a:4},{q:"1 + ☐ = 5",a:4},
    {q:"☐ + 2 = 5",a:3},{q:"2 + ☐ = 5",a:3},
    {q:"☐ + 3 = 5",a:2},{q:"3 + ☐ = 5",a:2},
    {q:"☐ + 4 = 5",a:1},{q:"4 + ☐ = 5",a:1}
  ];
  shuffleInPlace(pool);
  return {pool:pool, i:0, msg:""};
}

function freshA2() {
  var pool = [{n:6,bit:1},{n:7,bit:2},{n:8,bit:3},{n:9,bit:4}];
  shuffleInPlace(pool);
  return {pool:pool, i:0, format:null, msg:""};
}

function freshA3() {
  return {
    items: [{n:7,bit:2},{n:9,bit:4},{n:6,bit:1},{n:8,bit:3}],
    selections: [new Set(),new Set(),new Set(),new Set()],
    results: [null,null,null,null]
  };
}

/* ============================================================
   SECTION 4 — App state + screen list
   ============================================================ */

var SCREENS = [
  {id:"home"},
  {id:"D1"}, {id:"D2"}, {id:"D3"}, {id:"D3FLASH"},
  {id:"W3"}, {id:"W5"},
  {id:"A1"}, {id:"A2"}, {id:"A3_INTRO"}, {id:"A3"},
  {id:"A_COMPLETE"}
];

var screenIndex = 0;
var state = {
  W3: freshW3(),
  W5: freshW5(),
  A2: freshA2(),
  A3: freshA3()
};

/* ============================================================
   SECTION 5 — Navigation
   ============================================================ */

var mainEl, backBtn, nextBtn;

function resetOnLeave(id) {
  if (id === "W3") state.W3 = freshW3();
  if (id === "W5") state.W5 = freshW5();
  if (id === "A2") state.A2 = freshA2();
  if (id === "A3") state.A3 = freshA3();
}

function navigate(dir) {
  if (dir < 0 && screenIndex === 0) return;
  if (dir > 0 && screenIndex === SCREENS.length - 1) return;
  resetOnLeave(SCREENS[screenIndex].id);
  screenIndex += dir;
  render();
}

function setScreen(id) {
  resetOnLeave(SCREENS[screenIndex].id);
  for (var i = 0; i < SCREENS.length; i++) {
    if (SCREENS[i].id === id) { screenIndex = i; render(); return; }
  }
}

function setHtml(str) { mainEl.innerHTML = str; }

function render() {
  var id = SCREENS[screenIndex].id;
  backBtn.style.visibility = (screenIndex === 0) ? "hidden" : "visible";
  nextBtn.style.visibility = (screenIndex === 0 || screenIndex === SCREENS.length - 1) ? "hidden" : "visible";
  if      (id === "home")       renderHome();
  else if (id === "D1")         renderD1();
  else if (id === "D2")         renderD2();
  else if (id === "D3")         renderD3();
  else if (id === "D3FLASH")    runD3Flash();

  else if (id === "W5")         renderW5();

}

    "☐ + 4 = 5","4 + ☐ = 5"
  ];

  var items = qs.map(function(q) {
    return '<div class="ps-blank-item">'
      +escHtml(q).replace("☐", '<span class="ps-blank-box"></span>')
      +'</div>';
  }).join("");

  var html = '<div class="printSheet">'
    +psHeader()
    +psNameLine()
    +'<div class="ps-title">Worksheet: Make 5 — Both Ways</div>'
    +'<div class="ps-sub">Fill in the missing number to make 5.</div>'
    +'<div class="ps-score-box"><div class="sb-label">Score:</div><div class="sb-box"></div><div style="font-size:11px;color:#aaa;">&nbsp;out of 8</div></div>'
    +'<div class="ps-grid ps-grid-2" style="gap:12px;">'+items+'</div>'
    +psFooter("Worksheet: Make 5 — Both Ways")
    +'</div>';

  injectAndPrint(html);
}

/* ── A2 Worksheet: Bond facts ── */
function printA2Worksheet() {
  var qs = [
    {q:"6 = 5 + ☐"},{q:"☐ + 5 = 6"},
    {q:"7 = 5 + ☐"},{q:"☐ + 5 = 7"},
    {q:"8 = 5 + ☐"},{q:"☐ + 5 = 8"},
    {q:"9 = 5 + ☐"},{q:"☐ + 5 = 9"}
  ];

  var items = qs.map(function(item) {
    return '<div class="ps-blank-item">'
      +escHtml(item.q).replace("☐",'<span class="ps-blank-box"></span>')
      +'</div>';
  }).join("");

  var html = '<div class="printSheet">'
    +psHeader()
    +psNameLine()
    +'<div class="ps-title">Worksheet: Bond Facts for 6, 7, 8, 9</div>'
    +'<div class="ps-sub">Fill in the missing number. Remember: every number from 6–9 is 5 plus something.</div>'
    +'<div class="ps-score-box"><div class="sb-label">Score:</div><div class="sb-box"></div><div style="font-size:11px;color:#aaa;">&nbsp;out of 8</div></div>'
    +'<div class="ps-grid ps-grid-2" style="gap:12px;">'+items+'</div>'
    +'<div style="margin-top:22px;font-size:11px;font-weight:700;color:#888;">Hint: 6=5+1 &nbsp;·&nbsp; 7=5+2 &nbsp;·&nbsp; 8=5+3 &nbsp;·&nbsp; 9=5+4</div>'
    +psFooter("Worksheet: Bond Facts for 6, 7, 8, 9")
    +'</div>';

  injectAndPrint(html);
}

/* ── A3 Worksheet: Fill in the dots ── */
function printA3Worksheet() {
  var items = [
    {n:6,bit:1},{n:7,bit:2},{n:8,bit:3},{n:9,bit:4}
  ];
  var rows = items.map(function(it) {
    return '<div class="ps-bond-item">'
      +'<div style="font-size:28px;font-weight:900;">'+it.n+' = 5 + ☐</div>'
      +'<div class="ps-bond-dominos">'
      +dominoSVGPrint(5,56)
      +'<span style="font-size:20px;font-weight:900;padding:0 6px;">+</span>'
      +dominoSVGBlank(56)
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#888;">'
      +'<span>Write the missing number:</span>'
      +'<div style="width:40px;height:32px;border-bottom:2px solid #333;"></div>'
      +'</div>'
      +'</div>';
  }).join("");

  var html = '<div class="printSheet">'
    +psHeader()
    +psNameLine()
    +'<div class="ps-title">Worksheet: Fill in the Dots</div>'
    +'<div class="ps-sub">For each number, draw the missing dots on the blank domino and write the missing number.</div>'
    +'<div class="ps-score-box"><div class="sb-label">Score:</div><div class="sb-box"></div><div style="font-size:11px;color:#aaa;">&nbsp;out of 4</div></div>'
    +'<div class="ps-grid ps-grid-2" style="gap:16px;">'+rows+'</div>'
    +psFooter("Worksheet: Fill in the Dots")
    +'</div>';

  injectAndPrint(html);
}
